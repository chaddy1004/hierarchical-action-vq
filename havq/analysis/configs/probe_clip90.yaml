# Same oracle probe as probe.yaml, but at the clip90 (3 s) scale, to test the
# "a 1/3 s clip is too short to contain an action" hypothesis: does a longer
# clip raise the action ceiling? NOTE: the clip90 cache is only ~63% extracted
# (participants P01-P05 only), so heldout_participant holds out P04, and the
# random_clip / heldout_video numbers are the ones directly comparable to clip10.

paths:
  features_root: "/home/chaddy/Dataset-archive/HD-EPIC"
  narrations_pkl: "/home/chaddy/datasets/HD-EPIC/hd-epic-annotations/narrations-and-action-segments/HD_EPIC_Narrations.pkl"
  verb_classes_csv: "/home/chaddy/datasets/HD-EPIC/hd-epic-annotations/narrations-and-action-segments/HD_EPIC_verb_classes.csv"
  results_dir: "analysis_results/probe_clip90"

model: "vjepa"
scale:
  n_clip_frame: 90
  stride: 90

probe:
  device: "cuda"
  seed: 0
  standardize: true
  batch_size: 8192
  epochs: 40
  lr: 1.0e-3
  weight_decay: 1.0e-4
  mlp_hidden: 512
  topk: [1, 5]
  heldout_video_fraction: 0.2
  heldout_participants: ["P04"]
